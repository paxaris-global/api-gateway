server:
  port: 8085

spring:
  main:
    web-application-type: reactive
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: keycloak_admin_v1_route
              uri: ${KEYCLOAK_BASE_URL}
              predicates:
                - Path=/api/v1/identity/{realm}/admin/**
              filters:
                - RewritePath=/api/v1/identity/(?<realm>[^/]+)/admin/(?<segment>.*), /admin/realms/${realm}/${segment}
                - PreserveHostHeader=true

            - id: identity_service_v1_route
              uri: ${IDENTITY_SERVICE_URL}
              predicates:
                - Path=/api/v1/identity,/api/v1/identity/**
              filters:
                - StripPrefix=3

            - id: project_service_v1_route
              uri: ${PROJECT_MANAGEMENT_BASE_URL}
              predicates:
                - Path=/api/v1/project,/api/v1/project/**
              filters:
                - StripPrefix=2

            - id: product_service_route
              uri: ${PROJECT_MANAGEMENT_BASE_URL}
              predicates:
                - Path=/product/**
              filters:
                - StripPrefix=1

            - id: identity_service_route
              uri: ${IDENTITY_SERVICE_URL}
              predicates:
                - Path=/identity,/identity/**
              filters:
                - StripPrefix=1

            - id: keycloak_admin_route
              uri: ${KEYCLOAK_BASE_URL}
              predicates:
                - Path=/identity/{realm}/admin/**
              filters:
                - RewritePath=/identity/(?<realm>[^/]+)/admin/(?<segment>.*), /admin/realms/${realm}/${segment}
                - PreserveHostHeader=true

            - id: dynamic_project_route
              uri: ${PROJECT_MANAGEMENT_BASE_URL}
              predicates:
                - Path=/**

gateway:
  project-roles-path: ${GATEWAY_PROJECT_ROLES_PATH:/api/v1/project/roles}
  cors:
    allowed-origins: ${GATEWAY_CORS_ALLOWED_ORIGINS:http://localhost:4200}
    allowed-methods: ${GATEWAY_CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
    allowed-headers: ${GATEWAY_CORS_ALLOWED_HEADERS:*}
    allow-credentials: ${GATEWAY_CORS_ALLOW_CREDENTIALS:true}
  role-loader:
    max-retries: ${GATEWAY_ROLE_LOADER_MAX_RETRIES:12}
    initial-retry-ms: ${GATEWAY_ROLE_LOADER_INITIAL_RETRY_MS:5000}
    request-timeout-seconds: ${GATEWAY_ROLE_LOADER_REQUEST_TIMEOUT_SECONDS:10}
    default-realm: ${GATEWAY_ROLE_LOADER_DEFAULT_REALM:defaultRealm}
  role-refresh:
    delay-seconds: ${GATEWAY_ROLE_REFRESH_DELAY_SECONDS:10}

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  pattern:
    level: "%5p [traceId=%X{traceId:-},spanId=%X{spanId:-},correlationId=%X{correlationId:-}]"
  level:
    root: INFO
    com.paxaris.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
